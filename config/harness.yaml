pool:
  min_sessions: 2
  health_interval: 30
  max_session_age: 4
  max_reconnect_retries: 3

io:
  poll_interval: 0.1
  command_timeout: 120

claude:
  executable: "claude"
  working_directory: "."

auth:
  method: "subscription_oauth"
  provider: "anthropic"

api:
  host: "127.0.0.1"
  port: 8420

logging:
  level: "INFO"
  file: "claude-harness.log"
  max_size: "10MB"
  backup_count: 5

verification:
  loop_limit: 5
  reports_dir: "verification-reports"

development:
  debug: false
  mock_tmux: false